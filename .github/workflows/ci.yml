name: CI

on:
  push:
    branches: [main]
  pull_request:

jobs:
  test:
    name: Typecheck, lint, unit tests
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm
      - run: npm ci
      - run: npm run typecheck
      - run: npm run lint
      - run: npm test

  e2e:
    name: End-to-end (Playwright)
    runs-on: ubuntu-latest
    # The single e2e test geocodes against the live public Nominatim API (no
    # mock — see tests/e2e/route-planning.spec.ts), so it can fail for
    # reasons unrelated to this repo (rate limiting, Nominatim downtime).
    # Informational rather than a merge-blocking gate for that reason.
    continue-on-error: true
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm
      - run: npm ci
      - run: npx playwright install --with-deps chromium
      - run: npm run test:e2e
      - uses: actions/upload-artifact@v4
        if: failure()
        with:
          name: playwright-report
          path: playwright-report/
          retention-days: 7
